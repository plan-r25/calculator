<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="utf8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legendary Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  </head>
  <body>
    <div class="p-container">
      <div class="display">
        <h2 id="calc" class="diss"></h2>
        <h4 id="result" class="diss"></h4>
      </div>
      <div id="buttons">
        <div class="row">
          <button id="delete">AC</button>
          <button id="seven">7</button>
          <button id="four">4</button>
          <button id="one">1</button>
          <button id="d-zero">00</button>
        </div>
        <div class="row">
          <button id="remainder">%</button>
          <button id="eight">8</button>
          <button id="five">5</button>
          <button id="two">2</button>
          <button id="zero">0</button>
        </div>
        <div class="row">
          <button id="clear">
            <span class="material-symbols-outlined">Backspace</span>
          </button>
          <button id="nine">9</button>
          <button id="six">6</button>
          <button id="three">3</button>
          <button id="decimal">.</button>
        </div>
        <div class="row">
          <button id="divide">/</button>
          <button id="multiply">*</button>
          <button id="minus">-</button>
          <button id="add">+</button>
          <button id="equal">
            <span class="material-symbols-outlined">Equal</span>
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
